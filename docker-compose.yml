version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - webnet

  web:
    image: nginx:alpine
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - webnet

  api:
    image: nginx:alpine
    volumes:
      - ./api/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - webnet

networks:
  webnet:
