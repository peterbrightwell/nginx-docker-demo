version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - webnet

  backend:
    image: nginx:alpine
    volumes:
      - ./app/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - webnet

networks:
  webnet:
